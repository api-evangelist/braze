description: >-
  Braze is a leading customer engagement platform providing REST APIs for managing
  user profiles, orchestrating multi-channel messaging campaigns, and exporting
  analytics. The platform supports email, SMS, push notifications, in-app messages,
  and content cards across mobile and web channels. Braze uses Bearer token
  authentication with region-specific REST endpoints and offers extensive webhook
  and Canvas automation capabilities for lifecycle marketing.
apis:
