    description: The Braze REST API enables server-side operations including creating and updating user
      profiles, triggering campaigns and Canvases, sending transactional messages, managing product catalogs,
      controlling subscription groups, and exporting campaign analytics and user data. Region-specific
      base URLs serve US, EU, AU, ID, and JP instances with Bearer token auth.
